name: llama_guard_4
class: guardrail_eval.models.llama_guard.LlamaGuard4
model_path: models/Llama-Guard-4-12B

backend: vllm
backend_kwargs:
  dtype: bfloat16
  tensor_parallel_size: 1            # default to single-GPU mode for broader compatibility
  limit_mm_per_prompt: { image: 5 }
  max_model_len: 8192
  gpu_memory_utilization: 0.85

sampling:
  temperature: 0.0
  max_tokens: 20                     # output is terse: "unsafe\nS9"
